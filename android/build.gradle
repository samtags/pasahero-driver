// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '35')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.1.20'

        ndkVersion = "28.1.13356709"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.google.gms:google-services:4.4.1')
        classpath('com.android.tools.build:gradle:8.11.0')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
        classpath('com.google.firebase:firebase-crashlytics-gradle:3.0.2')
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            url 'https://api.mapbox.com/downloads/v2/releases/maven'
            authentication { basic(BasicAuthentication) }
            credentials {
                username = 'mapbox'
                password = project.properties['MAPBOX_DOWNLOADS_TOKEN'] ?: ""
            }
        }
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }

    def useRnSourceBuild = (findProperty("useRnSourceBuild") ?: System.getenv("USE_RN_SOURCE_BUILD") ?: "false").toBoolean()
    if (useRnSourceBuild) {
        configurations.all {
            resolutionStrategy.dependencySubstitution {
                substitute(module("com.facebook.react:react-native"))
                    .using(project(":ReactAndroid"))
                    .because("Force react-native dependencies to resolve to the local ReactAndroid source build.")
                substitute(module("com.facebook.react:react-android"))
                    .using(project(":ReactAndroid"))
                    .because("Build ReactAndroid from source for 16 KB page size support.")
                substitute(module("com.facebook.react:hermes-android"))
                    .using(project(":ReactAndroid:hermes-engine"))
                    .because("Build Hermes from source for 16 KB page size support.")
            }
        }
    }
}

gradle.projectsEvaluated {
    def useRnSourceBuild = (findProperty("useRnSourceBuild") ?: System.getenv("USE_RN_SOURCE_BUILD") ?: "false").toBoolean()
    if (useRnSourceBuild) {
        def appPreRelease = tasks.findByPath(":app:preReleaseBuild")
        if (appPreRelease != null) {
            appPreRelease.dependsOn(":ReactAndroid:build", ":ReactAndroid:hermes-engine:build")
        }
    }
}
